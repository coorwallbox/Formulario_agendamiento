<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Agendamiento</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-card">

  <header class="app-header">
    <h1>Formulario de agendamiento</h1>
  </header>

  <!-- Navegación de tabs (una por marca) -->
  <nav class="tabs-nav" id="tabsNav">
    <button class="tab-btn active" data-tab="Hyundai" type="button">Hyundai</button>
    <button class="tab-btn" data-tab="Volvo" type="button">Volvo</button>
    <button class="tab-btn" data-tab="MG" type="button">MG</button>
    <button class="tab-btn" data-tab="Mazda" type="button">Mazda</button>
    <button class="tab-btn" data-tab="Cupra" type="button">Cupra</button>
  </nav>

  <!-- Contenido de cada tab -->
  <main id="tabsContainer">

    <!-- ===== Hyundai ===== -->
    <section class="tab-panel active" data-tab-panel="Hyundai">
      <div class="form-card">
        <form class="client-form" id="formHyundai" data-brand="Hyundai" novalidate>

          <div class="form-group">
            <label for="clientNameHyundai">Nombre del cliente</label>
            <input type="text" id="clientNameHyundai" name="clientName" required />
            <span class="field-error" data-error-for="clientNameHyundai"></span>
          </div>

          <div class="form-group">
            <label for="idNumberHyundai">Cédula</label>
            <input type="text" id="idNumberHyundai" name="idNumber" inputmode="numeric" required />
            <span class="field-error" data-error-for="idNumberHyundai"></span>
          </div>

          <div class="form-group">
            <label for="phoneHyundai">Celular</label>
            <input type="text" id="phoneHyundai" name="phone" inputmode="numeric" required />
            <span class="field-error" data-error-for="phoneHyundai"></span>
          </div>

          <div class="form-group">
            <label for="vehicleRefHyundai">Referencia de vehículo</label>
            <select id="vehicleRefHyundai" name="vehicleRef" required>
              <option value="" disabled selected>Seleccione...</option>
              <option value="opcion1">Kona Electrica</option>
            </select>
            <span class="field-error" data-error-for="vehicleRefHyundai"></span>
          </div>

          <div class="form-group">
            <label for="addressHyundai">Dirección</label>
            <input type="text" id="addressHyundai" name="address" required />
            <span class="field-error" data-error-for="addressHyundai"></span>
          </div>

          <div class="form-group">
            <label for="cityHyundai">Ciudad</label>
            <input type="text" id="cityHyundai" name="city" required />
            <span class="field-error" data-error-for="cityHyundai"></span>
          </div>

          <div class="form-group">
            <label for="advisorNameHyundai">Nombre del asesor</label>
            <input type="text" id="advisorNameHyundai" name="advisorName" required />
            <span class="field-error" data-error-for="advisorNameHyundai"></span>
          </div>

          <div class="form-group form-group-full">
            <label for="observationsHyundai">Observaciones</label>
            <textarea id="observationsHyundai" name="observations" rows="4"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">Registrar</button>
            <span class="submit-feedback" data-feedback-for="formHyundai"></span>
          </div>

        </form>
      </div>
    </section>

          <div class="form-actions">

        </form>

    </section>

  </main>

  </div>

  <!-- Orden de carga: utils.js primero (helpers), luego main.js (lógica principal) -->
  <script src="utils.js"></script>
  <script src="main.js"></script>
</body>
</html>
